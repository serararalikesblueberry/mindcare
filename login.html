<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · MindCare</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 60% 60% at 90% 10%, rgba(244,169,138,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 5% 90%, rgba(107,143,113,0.12) 0%, transparent 55%),
      var(--cream);
    padding: 32px 20px;
  }

  .auth-box {
    width: 100%;
    max-width: 440px;
    animation: fadeUp 0.45s ease both;
  }

  .auth-logo {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 28px;
    color: var(--warm-brown);
  }

  .auth-logo span { font-style: italic; color: var(--terracotta); }

  .tab-row {
    display: flex;
    background: var(--cream-dark);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 9px;
    border: none;
    background: transparent;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--warm-brown);
    box-shadow: 0 1px 6px rgba(61,43,31,0.08);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.25s ease both; }

  .role-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .role-opt {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
  }
  .role-opt:hover { border-color: var(--peach); }
  .role-opt.selected { border-color: var(--warm-brown); background: var(--cream-dark); }
  .role-opt .r-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .role-opt .r-label { font-size: 0.85rem; font-weight: 600; }

  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.83rem;
    color: var(--muted);
  }

  .error-msg {
    background: #FEE2E2;
    color: #991B1B;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div id="toast"></div>

<div class="auth-box">
  <div class="auth-logo">🌿 Mind<span>Care</span></div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- ── Login ── -->
    <div class="tab-panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Your display name" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="login-btn">Sign In</button>
    </div>

    <!-- ── Register ── -->
    <div class="tab-panel" id="panel-register">
      <div class="error-msg" id="reg-error"></div>

      <div class="form-group">
        <label>I am a</label>
        <div class="role-select">
          <div class="role-opt selected" id="role-student" onclick="selectRole('student')">
            <div class="r-icon">🎓</div>
            <div class="r-label">Student</div>
          </div>
          <div class="role-opt" id="role-counsellor" onclick="selectRole('counsellor')">
            <div class="r-icon">🧑‍⚕️</div>
            <div class="r-label">Counsellor</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="reg-username" placeholder="Anything — stays anonymous" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <button class="btn btn-peach btn-full btn-lg" onclick="doRegister()" id="reg-btn">Create Account</button>
    </div>
  </div>

  <div class="auth-footer">By continuing you agree to keep this space safe and kind 🌱</div>
</div>

<script src="api.js"></script>
<script>
  let selectedRole = 'student';

  // Auto-switch to register tab if URL has #register
  if (window.location.hash === '#register') switchTab('register');

  // Redirect if already logged in
  if (localStorage.getItem('mc_loggedIn')) redirectByRole();

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-student').classList.toggle('selected', role === 'student');
    document.getElementById('role-counsellor').classList.toggle('selected', role === 'counsellor');
  }

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    errEl.classList.remove('show');
    if (!username || !password) { showErr(errEl, 'Please fill in both fields.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const data = await mcLogin(username, password);

    if (data.error) {
      showErr(errEl, data.error);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      redirectByRole();
    }
  }

  async function doRegister() {
    const btn = document.getElementById('reg-btn');
    const errEl = document.getElementById('reg-error');
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;

    errEl.classList.remove('show');
    if (!username || !password) { showErr(errEl, 'Please fill in all fields.'); return; }
    if (password.length < 6)    { showErr(errEl, 'Password must be at least 6 characters.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const data = await mcRegister(username, password, selectedRole);

    if (data.error) {
      showErr(errEl, data.error);
      btn.disabled = false;
      btn.textContent = 'Create Account';
    } else {
      redirectByRole();
    }
  }

  function redirectByRole() {
    const role = localStorage.getItem('mc_role');
    window.location.href = role === 'counsellor' ? 'counsellor.html' : 'student.html';
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('panel-login').classList.contains('active');
    if (loginActive) doLogin(); else doRegister();
  });
</script>
</body>
</html>
